#!KAMAILIO
#
# Kamailio - OctoSIP Honeypot
# Simulate FreePBX 16 / Asterisk 20 to attract attackers
# Without a database, realistic local responses
#

####### Global parameters #########

debug=2
log_stderror=no
log_facility=LOG_LOCAL0
log_prefix="[K1-HONEYPOT] "

# Simulate FreePBX
server_header="FPBX-16.0.40(20.5.0)"
user_agent_header="FPBX-16.0.40(20.5.0)"

children=8

listen=udp:0.0.0.0:SIP_PORT

tcp_connection_lifetime=3605
tcp_max_connections=2048

####### Modules #########

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "jsonrpcs.so"
loadmodule "pike.so"
loadmodule "auth.so"

####### Module parameters #########

# ----- tm -----
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# ----- rr -----
modparam("rr", "append_fromtag", 1)

# ----- pike -----
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 500)
modparam("pike", "remove_latency", 4)

# ----- auth -----
modparam("auth", "nonce_expire", 300)

####### Routing logic #########

request_route {

    if (!mf_process_maxfwd_header(10)) {
        xlog("L_WARN", "MAXFWD_EXCEEDED src=$si method=$rm\n");
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!sanity_check(1024, 7)) {
        xlog("L_WARN", "SANITY_FAIL src=$si method=$rm\n");
        exit;
    }

    if (!pike_check_req()) {
        xlog("L_WARN", "PIKE_BLOCK src=$si method=$rm ua=$ua\n");
        sl_send_reply("503", "Service Unavailable");
        exit;
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (is_method("REGISTER")) {
        if (is_present_hf("Authorization")) {
            xlog("L_INFO", "AUTH_ATTEMPT src=$si ua=$ua from=$fu auth_hdr=$hdr(Authorization) ci=$ci\n");
            sl_send_reply("403", "Forbidden");
        } else {
            xlog("L_INFO", "SIPREQ src=$si:$sp method=$rm from=$fu to=$tu contact=$ct ua=$ua ci=$ci\n");
            www_challenge("freepbx.local", "0");
        }
        exit;
    }

    xlog("L_INFO", "SIPREQ src=$si:$sp method=$rm from=$fu to=$tu contact=$ct ua=$ua ci=$ci\n");

    if (is_method("INVITE")) {
        sl_send_reply("100", "Trying");
        sl_send_reply("486", "Busy Here");
        exit;
    }

    if (is_method("ACK")) {
        exit;
    }

    if (is_method("CANCEL")) {
        sl_send_reply("200", "OK");
        exit;
    }

    xlog("L_INFO", "OTHER_METHOD src=$si method=$rm ua=$ua from=$fu\n");
    sl_send_reply("405", "Method Not Allowed");
    exit;
}

reply_route {
    xlog("L_INFO", "SIPREP src=$si status=$rs reason=$rr ci=$ci\n");
}
